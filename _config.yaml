# site properties and page defaults
title: Pan-lab-SMART
subtitle: See the small and know the large
description: Pan Lab at Shenzhen Medical Academy of Research and Translation (SMART) — focusing on single particle Cryo-EM, structural biology of membrane proteins, voltage-gated ion channels, GLUT9, and drug discovery.
url: https://pan-lab-smart.github.io
lang: en
header: images/header.jpg
footer: 
proofer: false

# Open Graph / SEO
og_image: images/panteam.jpg
twitter:
  card: summary_large_image
  site: "@Pan-lab-SMART"
  creator: "@Pan-lab-SMART"

# site social media and other links
links:
  email: panxj@smart.org.cn
  orcid: 0000-0003-1882-5361
  google-scholar: ETJoidYAAAAJ
  github: Pan-lab-SMART
  twitter: Pan-lab-SMART
  youtube: Pan-lab-SMART

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles
  style: compressed

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
